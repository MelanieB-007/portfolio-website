<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Der dunkle Hintergrund-Rahmen -->
  <rect width="32" height="32" rx="6" fill="#0a1012" />
  
  <!-- Das Browser-Fenster -->
  <rect x="4" y="6" width="24" height="20" rx="3" stroke="#0098ad" stroke-width="2" />
  
  <!-- Die obere Leiste im Fenster -->
  <path d="M4 12H28" stroke="#0098ad" stroke-width="2" />
  
  <!-- Der leuchtende Punkt (Aktiv-Indikator) -->
  <circle cx="8" cy="9" r="1.5" fill="#00d4eb">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Das Code-Symbol </> -->
  <path d="M13 16L10 19L13 22" stroke="#00d4eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M19 16L22 19L19 22" stroke="#00d4eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M17 15L15 23" stroke="#0098ad" stroke-width="2" stroke-linecap="round" />
</svg>
